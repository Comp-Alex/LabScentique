[PHP]
; Minimal php.ini to enable bundled SQLite extensions for local dev
extension_dir = "ext"

; Enable SQLite PDO driver and sqlite3 extension
extension=php_pdo_sqlite.dll
extension=php_sqlite3.dll
extension=php_curl.dll

; Recommended settings for development
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Session save path (optional) - overrideable via environment
;session.save_path = "C:/Windows/Temp"

; Short open tag disabled by default; change if your code requires it
short_open_tag = Off
